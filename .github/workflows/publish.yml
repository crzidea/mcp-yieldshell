name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform a dry run (do not publish to PyPI, only build)'
        type: boolean
        required: false
        default: false

jobs:
  test:
    name: Run Tests and Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --all-groups

      - name: Lint check
        run: |
          uv run ruff check .

      - name: Type check
        run: |
          uv run pyright

      - name: Run tests
        run: |
          uv run pytest

  publish:
    name: Build and Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    
    # Required permissions for PyPI Trusted Publishing OIDC token generation
    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi
      url: https://pypi.org/p/mcp-yield-shell

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build release distributions
        run: |
          uv build

      - name: Publish package distributions to PyPI
        # Only publish if we are triggered by a version tag, or a manual dispatch where dry_run is false
        if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        uses: pypa/gh-action-pypi-publish@release/v1
